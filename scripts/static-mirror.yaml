# Static mirror configuration for SEO indexing.
#
# The build script auto-scans docs/notes/*/_sidebar.md and mirrors both
# external (GitHub raw) and local content into static HTML. Every external
# route resolves to https://github.com/<github_user>/<repo>/blob/<default_branch>/...
# where <repo> is the first path segment of the sidebar link.

base_url: https://erectbranch.github.io
github_user: erectbranch
default_branch: master

# ISO 8601 date applied as <lastmod> for every sitemap.xml entry.
# Leave empty to use today's UTC date on each build.
lastmod: "2026-01-17"

# Site metadata used by JSON-LD publisher / author blocks and RSS channel.
site:
  name: "Branch Log"
  description: "Study notes on Efficient AI, TinyML, MLSys, embedded systems, and HPC."
  author: "Sungjae Jeon"
  author_url: "https://github.com/erectbranch"

# RSS feed (docs/rss.xml). 30 most-recent posts is the RSS 2.0 convention.
rss:
  max_items: 30

# External GitHub repo → display course name. Enriches breadcrumb and JSON-LD headline.
course_names:
  MIT-Efficient-AI: "TinyML and Efficient Deep Learning Computing"
  udemy-speaker-recognition: "Speaker Recognition"
  CMU-Advanced-NLP: "Advanced NLP"
  kmooc-advanced-ml: "Advanced Machine Learning"
  arm-system-developers-guide: "ARM System Developer's Guide"
  COD-RISC-V: "Computer Organization and Design RISC-V"
  MicroC_OS-II: "MicroC/OS-II The Real-Time Kernel"
  modern-c: "Modern C"
  python-tricks: "Python Tricks"
  pro-cuda-c: "Professional CUDA C Programming"
  enroot-slurm: "Enroot on Slurm for Distributed Deep Learning"

# Sidebar directories to skip during mirroring (populate as needed).
skip_sidebars: []

# Sidebar label/link keywords to skip (case-insensitive substring match).
# NOTE: "전체보기" is intentional — matches the Korean "View all" entry in source sidebars.
skip_label_keywords:
  - 전체보기
